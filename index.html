<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taurodia RPG</title>
    <link rel="icon" type="image/jpg" href="chifre.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="grid-header">
        <div class="field">
            <label>NOME DO PERSONAGEM</label>
            <input type="text" id="char-name" placeholder="Ex: Gerson Romildo da Silva">
        </div>
        <div class="field">
            <label>JOGADOR</label>
            <input type="text" id="player-name" placeholder="Ex: avestruzdapernalisa">
        </div>
        
        <div class="field">
            <label>CLASSE</label>
            <select id="char-class" onchange="updateSpecOptions(); atualizarStatus();">
                <option value="nenhuma">Nenhuma</option>
                <option value="sobrevivente">Sobrevivente</option>
                <option value="guerreiro">Guerreiro</option>
                <option value="erudito">Erudito</option>
            </select>
        </div>
        
        <div class="field" id="spec-field">
            <label>ESPECIALIZAÇÃO</label>
            <select id="char-spec" onchange="atualizarStatus()">
                <option value="nenhuma">Selecione uma Classe primeiro</option>
            </select>
        </div>
    </div>

    <div class="resquicios-container">
        <label>RESQUÍCIOS: <span id="resq-label-val">50</span></label>
        <div class="resquicios-controls">
            <input type="range" id="resq-slider" min="0" max="100" value="50" oninput="updateResquicios(this.value)">
            <input type="number" id="resq-num" min="0" max="100" value="50" oninput="updateResquicios(this.value)">
        </div>
    </div>

    <div class="grid-status">
        <div class="status-card card-hp">
            <div class="status-header">
                <div class="status-label">VIDA (HP)</div>
                <div class="status-values">
                    <span class="curr-val" id="curr-hp-text">0</span>
                    <span class="divider">/</span>
                    <span class="max-val" id="max_hp">100</span>
                </div>
            </div>
            
            <div class="status-control-row">
                <div class="status-control">
                    <button class="status-btn btn-heavy" onclick="changeStatus('hp', -5)">-5</button>
                    <button class="status-btn" onclick="changeStatus('hp', -1)">-1</button>
                    <span class="control-indicator">📊</span>
                    <button class="status-btn" onclick="changeStatus('hp', 1)">+1</button>
                    <button class="status-btn btn-heavy" onclick="changeStatus('hp', 5)">+5</button>
                </div>
            </div>
            
            <div class="status-bar-container">
                <div class="status-bar-fill" id="bar-hp-fill"></div>
                <div class="status-bar-glare"></div>
            </div>
        </div>

        <div class="status-card card-pc">
            <div class="status-header">
                <div class="status-label">PONTOS DE CONJURAÇÃO (PC)</div>
                <div class="status-values">
                    <span class="curr-val" id="curr-pc-text">0</span>
                    <span class="divider">/</span>
                    <span class="max-val" id="max_pc">100</span>
                </div>
            </div>
            
            <div class="status-control-row">
                <div class="status-control">
                    <button class="status-btn btn-heavy" onclick="changeStatus('pc', -5)">-5</button>
                    <button class="status-btn" onclick="changeStatus('pc', -1)">-1</button>
                    <span class="control-indicator">🧙‍♂️</span>
                    <button class="status-btn" onclick="changeStatus('pc', 1)">+1</button>
                    <button class="status-btn btn-heavy" onclick="changeStatus('pc', 5)">+5</button>
                </div>
            </div>
            
            <div class="status-bar-container">
                <div class="status-bar-fill" id="bar-pc-fill"></div>
                <div class="status-bar-glare"></div>
            </div>
        </div>

        <div class="status-card card-fm">
            <div class="status-header">
                <div class="status-label">FRAGMENTO MENTAL (FM)</div>
                <div class="status-values">
                    <span class="curr-val" id="curr-fm-text">0</span>
                    <span class="divider">/</span>
                    <span class="max-val" id="max_fm">100</span>
                </div>
            </div>
            
            <div class="status-control-row">
                <div class="status-control">
                    <button class="status-btn btn-heavy" onclick="changeStatus('fm', -5)">-5</button>
                    <button class="status-btn" onclick="changeStatus('fm', -1)">-1</button>
                    <span class="control-indicator">🌌</span>
                    <button class="status-btn" onclick="changeStatus('fm', 1)">+1</button>
                    <button class="status-btn btn-heavy" onclick="changeStatus('fm', 5)">+5</button>
                </div>
            </div>
            
            <div class="status-bar-container">
                <div class="status-bar-fill" id="bar-fm-fill"></div>
                <div class="status-bar-glare"></div>
            </div>
        </div>
    </div>

    <button class="btn-fragmento" onclick="rollFragmentoMental()">🔮 FRAGMENTO MENTAL</button>
    <div id="fragmento-display" style="display:none;"></div>

    <h2>Atributos: <span id="pontos-restantes">10</span> pontos</h2>
    <div class="attributes">
        <div class="attr-box">
            <label>FOR</label>
            <div class="attr-controls">
                <button onclick="changeAttr('for', -1)">-</button>
                <input type="number" id="v-for" value="0" min="0" max="3" readonly>
                <button onclick="changeAttr('for', 1)">+</button>
            </div>
        </div>
        <div class="attr-box">
            <label>AGI</label>
            <div class="attr-controls">
                <button onclick="changeAttr('agi', -1)">-</button>
                <input type="number" id="v-agi" value="0" min="0" max="3" readonly>
                <button onclick="changeAttr('agi', 1)">+</button>
            </div>
        </div>
        <div class="attr-box">
            <label>VIG</label>
            <div class="attr-controls">
                <button onclick="changeAttr('vig', -1)">-</button>
                <input type="number" id="v-vig" value="0" min="0" max="3" readonly>
                <button onclick="changeAttr('vig', 1)">+</button>
            </div>
        </div>
        <div class="attr-box">
            <label>INT</label>
            <div class="attr-controls">
                <button onclick="changeAttr('int', -1)">-</button>
                <input type="number" id="v-int" value="0" min="0" max="3" readonly>
                <button onclick="changeAttr('int', 1)">+</button>
            </div>
        </div>
        <div class="attr-box">
            <label>ESP</label>
            <div class="attr-controls">
                <button onclick="changeAttr('esp', -1)">-</button>
                <input type="number" id="v-esp" value="0" min="0" max="3" readonly>
                <button onclick="changeAttr('esp', 1)">+</button>
            </div>
        </div>
        <div class="attr-box">
            <label>CAR</label>
            <div class="attr-controls">
                <button onclick="changeAttr('car', -1)">-</button>
                <input type="number" id="v-car" value="0" min="0" max="3" readonly>
                <button onclick="changeAttr('car', 1)">+</button>
            </div>
        </div>
    </div>

    <h2>Perícias</h2>
    <div class="roller-section">
        <div class="roller-grid">
            <div class="field">
                <label>SELECIONE A PERÍCIA</label>
                <select id="skill-sel">
                    <option value="" data-name="Teste Puro">Nenhuma</option>
                    <option value="agi" data-name="Furtividade">Furtividade (AGI)</option>
                    <option value="agi" data-name="Prestidigitação">Prestidigitação (AGI)</option>
                    <option value="for,agi" data-name="Luta">Luta (FOR+AGI)</option>
                    <option value="esp" data-name="Misticismo">Misticismo (ESP)</option>
                    <option value="esp,int" data-name="Arcanismo">Arcanismo (ESP+INT)</option>
                    <option value="car" data-name="Diplomacia">Diplomacia (CAR)</option>
                    <option value="esp" data-name="Perseverança">Perseverança (ESP)</option>
                    <option value="for,esp" data-name="Intimidação">Intimidação (FOR+ESP)</option>
                    <option value="int" data-name="Escutar">Escutar (INT)</option>
                    <option value="int" data-name="Procurar">Procurar (INT)</option>
                    <option value="esp" data-name="Olfato">Olfato (ESP)</option>
                    <option value="int" data-name="Tecnologia">Tecnologia (INT)</option>
                    <option value="int" data-name="História">História (INT)</option>
                    <option value="int" data-name="Idiomas">Idiomas (INT)</option>
                    <option value="int" data-name="Atualidades">Atualidades (INT)</option>
                    <option value="agi" data-name="Reflexo">Reflexo (AGI)</option>
                    <option value="int" data-name="Pilotagem">Pilotagem (INT)</option>
                    <option value="for" data-name="Resistência">Resistência (FOR)</option>
                    <option value="agi" data-name="Esquiva">Esquiva (AGI)</option>
                    <option value="int,esp" data-name="Memória">Memória (INT+ESP)</option>
                    <option value="esp" data-name="Sorte">Sorte (ESP)</option>
                    <option value="agi" data-name="Instinto">Instinto (AGI)</option>
                    <option value="int" data-name="Medicina">Medicina (INT)</option>
                    <option value="agi,for" data-name="Natação">Natação (AGI+FOR)</option>
                    <option value="agi,for" data-name="Escalada">Escalada (AGI+FOR)</option>
                    <option value="agi,for" data-name="Atletismo">Atletismo (AGI+FOR)</option>
                    <option value="car,int" data-name="Sedução">Sedução (CAR+INT)</option>
                </select>
            </div>
        </div>
        <button class="btn-roll" onclick="rollSkill()">ROLAR DADOS</button>
        <div id="result-display">> Resultado aparecerá aqui...</div>
    </div>

    <h2>Dados Personalizados</h2>
    <div class="custom-dice-container">
        <div class="dice-custom-grid">
            <div class="field">
                <label>QUANTIDADE</label>
                <input type="number" id="custom-qty" value="1" min="1">
            </div>
            <div class="field">
                <label>FACES</label>
                <select id="custom-faces">
                    <option value="2">d2</option>
                    <option value="4">d4</option>
                    <option value="6">d6</option>
                    <option value="8">d8</option>
                    <option value="10">d10</option>
                    <option value="12">d12</option>
                    <option value="20" selected>d20</option>
                    <option value="50">d50</option>
                    <option value="100">d100</option>
                </select>
            </div>
            <div class="field">
                <label>MODO</label>
                <select id="custom-mode">
                    <option value="soma">Soma</option>
                    <option value="vantagem">Vantagem (Maior)</option>
                    <option value="desvantagem">Desvantagem (Menor)</option>
                </select>
            </div>
        </div>
        <button class="btn-custom" onclick="rollCustomDice()">ROLAR DADOS</button>
    </div>

    <div id="custom-result-display">> Aguardando rolagem...</div>

    <div class="text-areas">
        <div class="field"><label>INVENTÁRIO</label><textarea style="height: 150px;" id="inv-text" placeholder="Armas, elixires, armaduras, etc."></textarea></div>
        <div class="field"><label>BRUXARIA</label><textarea style="height: 150px;" id="bru-text" placeholder="Rituais e conhecimentos arcanos."></textarea></div>
    </div>

    <div class="field" style="margin-top: 15px;">
        <label>ANOTAÇÕES</label>
        <textarea style="height: 150px;" id="notes-text" placeholder="Anotar coisas importantes ajudam a não se esquecer de pontos cruciais."></textarea>
    </div>

    <div class="btn-group">
        <button class="btn-save" onclick="saveToUrl()">Sincronizar na URL</button>
    </div>

    <div id="url-display" style="display:none;"></div>
</div>

<script src="script.js"></script>
</body>
</html>
