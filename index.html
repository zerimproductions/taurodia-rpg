<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Taurodia RPG - Ficha</title>
    <style>
        body { background: #1a1a1a; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 800px; background: #262626; padding: 25px; border: 2px solid #ff6600; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        h2 { color: #ffcc00; border-bottom: 1px solid #444; padding-bottom: 5px; text-transform: uppercase; font-size: 1.1rem; margin-top: 25px; }
        
        .grid-header { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        .field label { font-size: 0.8rem; color: #ff6600; font-weight: bold; }
        input, textarea, select { background: #111; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; margin-top: 5px; outline: none; }
        input:focus, textarea:focus { border-color: #ffcc00; }

        .attributes { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; }
        .attr-box { text-align: center; background: #111; padding: 10px; border-radius: 4px; border: 1px solid #333; }
        .attr-box input { width: 45px; text-align: center; font-size: 1.2rem; border: none; background: transparent; }

        .roller-section { background: #111; padding: 15px; border-radius: 4px; border: 1px solid #ffcc00; margin-bottom: 20px; }
        .roller-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; align-items: end; }
        
        #result-display { 
            background: #000; color: #00ff00; padding: 15px; border-left: 5px solid #ff6600; 
            font-family: monospace; margin: 15px 0; min-height: 40px; white-space: pre-line; font-size: 0.9rem;
        }

        .text-areas { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        textarea { resize: vertical; min-height: 120px; font-family: inherit; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; width: 100%; }
        button { flex: 1; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; border: none; border-radius: 4px; transition: 0.2s; }
        .btn-roll { background: #ff6600; color: black; }
        .btn-save { background: #444; color: #ffcc00; border: 1px solid #ffcc00; }
        button:hover { filter: brightness(1.2); }
        
        .save-notice { font-size: 0.7rem; color: #888; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="grid-header">
        <div class="field"><label>NOME DO PERSONAGEM</label><input type="text" id="char-name"></div>
        <div class="field"><label>JOGADOR</label><input type="text" id="player-name"></div>
    </div>

    <h2>Atributos Primordiais (Máx: 5)</h2>
    <div class="attributes">
        <div class="attr-box"><label>FOR</label><br><input type="number" id="v-for" value="1" min="1" max="5"></div>
        <div class="attr-box"><label>AGI</label><br><input type="number" id="v-agi" value="1" min="1" max="5"></div>
        <div class="attr-box"><label>VIG</label><br><input type="number" id="v-vig" value="1" min="1" max="5"></div>
        <div class="attr-box"><label>INT</label><br><input type="number" id="v-int" value="1" min="1" max="5"></div>
        <div class="attr-box"><label>ESP</label><br><input type="number" id="v-esp" value="1" min="1" max="5"></div>
        <div class="attr-box"><label>CAR</label><br><input type="number" id="v-car" value="1" min="1" max="5"></div>
    </div>

    <h2>Painel de Perícias</h2>
    <div class="roller-section">
        <div class="roller-grid">
            <div class="field"><label>PERÍCIA</label><input type="text" id="skill-name" placeholder="Ex: Furtividade"></div>
            <div class="field">
                <label>BÔNUS</label>
                <select id="skill-attr">
                    <option value="agi">AGI</option>
                    <option value="for">FOR</option>
                    <option value="int">INT</option>
                    <option value="esp">ESP</option>
                    <option value="car">CAR</option>
                    <option value="vig">VIG</option>
                </select>
            </div>
            <div class="field"><label>DADO</label><input type="number" id="dice-type" value="20"></div>
            <button class="btn-roll" onclick="rollSkill()">ROLAR</button>
        </div>
        <div id="result-display">> Aguardando rolagem...</div>
    </div>

    <div class="text-areas">
        <div class="field"><label>INVENTÁRIO</label><textarea id="inv-text"></textarea></div>
        <div class="field"><label>BRUXARIA</label><textarea id="bru-text"></textarea></div>
    </div>

    <div class="field" style="margin-top: 15px;">
        <label>ANOTAÇÕES GERAIS</label>
        <textarea id="notes-text"></textarea>
    </div>

    <div class="btn-group">
        <button class="btn-save" onclick="saveToUrl()">Sincronizar Dados na URL</button>
    </div>
    <p class="save-notice">Após clicar em sincronizar, copie o link do seu navegador para salvar sua ficha.</p>
</div>

<script>
    // Impedir valores maiores que 5 nos atributos [cite: 163]
    document.querySelectorAll('.attr-box input').forEach(input => {
        input.addEventListener('change', function() {
            if (this.value > 5) this.value = 5;
            if (this.value < 1) this.value = 1;
        });
    });

    function rollSkill() {
        const name = document.getElementById('skill-name').value || "Teste";
        const attrKeys = document.getElementById('skill-attr').value.split(',');
        const diceBase = parseInt(document.getElementById('dice-type').value) || 20;
        
        let sumAttr = 0;
        attrKeys.forEach(k => {
            sumAttr += parseInt(document.getElementById('v-' + k.trim()).value) || 0;
        });

        const roll = Math.floor(Math.random() * diceBase) + 1;
        const total = roll + sumAttr;
        const maxPossible = diceBase + sumAttr; // [cite: 211]
        const quality = (total / maxPossible) * 100;

        let cat = ""; // Categorias oficiais [cite: 212-219]
        if (quality <= 10) cat = "DESASTRE";
        else if (quality <= 20) cat = "FALHA";
        else if (quality <= 40) cat = "NORMAL";
        else if (quality <= 60) cat = "BÁSICO";
        else if (quality <= 80) cat = "ACEITÁVEL";
        else if (quality <= 90) cat = "ÓTIMO";
        else cat = "EXCELENTE";

        document.getElementById('result-display').innerHTML = 
            `> <strong>${name.toUpperCase()}</strong>\n` +
            `> Resultado: ${roll} (d${diceBase}) + ${sumAttr} (Atributos) = <strong>${total}</strong>\n` +
            `> Eficácia: ${quality.toFixed(1)}% | Sucesso: <strong>${cat}</strong>`;
    }

    function saveToUrl() {
        const data = {
            cn: document.getElementById('char-name').value,
            pn: document.getElementById('player-name').value,
            f: document.getElementById('v-for').value,
            a: document.getElementById('v-agi').value,
            v: document.getElementById('v-vig').value,
            i: document.getElementById('v-int').value,
            e: document.getElementById('v-esp').value,
            c: document.getElementById('v-car').value,
            inv: document.getElementById('inv-text').value,
            bru: document.getElementById('bru-text').value,
            not: document.getElementById('notes-text').value
        };
        
        const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        window.history.replaceState(null, null, "?sheet=" + encoded);
        alert("Ficha sincronizada com a URL! Copie o link do navegador para não perder seu progresso.");
    }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const sheetData = params.get('sheet');
        if (sheetData) {
            try {
                const d = JSON.parse(decodeURIComponent(escape(atob(sheetData))));
                document.getElementById('char-name').value = d.cn || "";
                document.getElementById('player-name').value = d.pn || "";
                document.getElementById('v-for').value = d.f || 1;
                document.getElementById('v-agi').value = d.a || 1;
                document.getElementById('v-vig').value = d.v || 1;
                document.getElementById('v-int').value = d.i || 1;
                document.getElementById('v-esp').value = d.e || 1;
                document.getElementById('v-car').value = d.c || 1;
                document.getElementById('inv-text').value = d.inv || "";
                document.getElementById('bru-text').value = d.bru || "";
                document.getElementById('notes-text').value = d.not || "";
            } catch(e) { console.error("Erro ao carregar dados da URL."); }
        }
    };
</script>

</body>
</html>
